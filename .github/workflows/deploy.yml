name: Deploy to Azure VM

on:
  push:
    branches: [main]
    paths:
      - 'tech-assessment-hub/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:        # lets you trigger manually from the Actions tab

concurrency:
  group: deploy-vm
  cancel-in-progress: false  # don't cancel mid-deploy

permissions:
  contents: read

env:
  REMOTE_APP_DIR: /opt/ta-hub/app

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up SSH key
        env:
          SSH_KEY: ${{ secrets.AZURE_VM_SSH_KEY }}
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$VM_HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Pack code
        run: |
          tar czf /tmp/ta-hub-deploy.tgz \
            --exclude='.git' \
            --exclude='venv' --exclude='.venv' \
            --exclude='__pycache__' --exclude='*.pyc' \
            --exclude='*.db' --exclude='*.db-wal' --exclude='*.db-shm' --exclude='*.db-journal' \
            --exclude='recovery_snapshots' \
            --exclude='data' \
            --exclude='.tech_assessment.db.*' --exclude='snapshot_*.db' \
            --exclude='.DS_Store' --exclude='node_modules' --exclude='.pytest_cache' \
            -C tech-assessment-hub .
          ls -lh /tmp/ta-hub-deploy.tgz

      - name: Upload to VM
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          scp -i ~/.ssh/deploy_key /tmp/ta-hub-deploy.tgz "$VM_USER@$VM_HOST:/tmp/ta-hub-deploy.tgz"

      - name: Extract + install deps + restart
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          ssh -i ~/.ssh/deploy_key "$VM_USER@$VM_HOST" "
            set -e
            sudo tar xzf /tmp/ta-hub-deploy.tgz -C $REMOTE_APP_DIR
            # Always force data -> /mnt/data (tarball excludes data entirely, but be defensive)
            sudo rm -rf $REMOTE_APP_DIR/data
            sudo ln -sfn /mnt/data $REMOTE_APP_DIR/data
            sudo find $REMOTE_APP_DIR -name '._*' -delete
            sudo chown -R $VM_USER:$VM_USER $REMOTE_APP_DIR
            sudo -u $VM_USER $REMOTE_APP_DIR/venv/bin/pip install -q -r $REMOTE_APP_DIR/requirements.txt
            sudo rm -f /tmp/ta-hub-deploy.tgz
            sudo systemctl restart ta-hub
          "

      - name: Health check
        env:
          VM_HOST: ${{ secrets.AZURE_VM_HOST }}
          VM_USER: ${{ secrets.AZURE_VM_USER }}
        run: |
          sleep 8
          HTTP_CODE=$(ssh -i ~/.ssh/deploy_key "$VM_USER@$VM_HOST" \
            "curl -s -o /dev/null -w '%{http_code}' http://127.0.0.1:8080/assessments")
          echo "HTTP $HTTP_CODE"
          case "$HTTP_CODE" in
            200|302|303|307|308) echo "✅ healthy" ;;
            *)
              echo "❌ unhealthy — tailing logs:"
              ssh -i ~/.ssh/deploy_key "$VM_USER@$VM_HOST" \
                "sudo tail -60 /var/log/ta-hub.log"
              exit 1
              ;;
          esac
