<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ServiceNow Tech Assessment — Dependency Graph</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.28.1/cytoscape.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f1117; color: #e1e4e8; display: flex; height: 100vh; overflow: hidden; }

/* Sidebar */
.sidebar { width: 300px; background: #161b22; border-right: 1px solid #30363d; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 16px; border-bottom: 1px solid #30363d; }
.sidebar-header h1 { font-size: 14px; font-weight: 600; color: #58a6ff; margin-bottom: 4px; }
.sidebar-header p { font-size: 11px; color: #8b949e; }

/* View Switcher */
.view-switcher { padding: 12px 16px; border-bottom: 1px solid #30363d; }
.view-switcher label { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
.view-tabs { display: flex; gap: 4px; flex-wrap: wrap; }
.view-tab { padding: 6px 10px; font-size: 12px; border: 1px solid #30363d; background: transparent; color: #c9d1d9; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.view-tab:hover { background: #21262d; border-color: #58a6ff; }
.view-tab.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }

/* Scope Selector */
.scope-selector { padding: 12px 16px; border-bottom: 1px solid #30363d; }
.scope-selector label { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; display: block; margin-bottom: 8px; }
.scope-selector select { width: 100%; padding: 6px 8px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; font-size: 12px; }

/* Filters */
.filters { padding: 12px 16px; flex: 1; overflow-y: auto; }
.filters-title { font-size: 11px; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.filter-section { margin-bottom: 16px; }
.filter-section h3 { font-size: 11px; color: #8b949e; margin-bottom: 6px; font-weight: 500; }
.filter-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
.filter-item input[type="checkbox"] { accent-color: #58a6ff; cursor: pointer; }
.filter-item .color-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.filter-item label { font-size: 12px; color: #c9d1d9; cursor: pointer; flex: 1; }
.filter-item .count { font-size: 11px; color: #8b949e; }

/* Edge Filters */
.edge-filter-item { display: flex; align-items: center; gap: 8px; padding: 4px 0; cursor: pointer; }
.edge-filter-item input[type="checkbox"] { accent-color: #58a6ff; cursor: pointer; }
.edge-filter-item .edge-line { width: 20px; height: 2px; flex-shrink: 0; }
.edge-filter-item label { font-size: 12px; color: #c9d1d9; cursor: pointer; flex: 1; }

/* Main Content */
.main { flex: 1; display: flex; flex-direction: column; position: relative; }
.toolbar { padding: 8px 16px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; }
.toolbar .stats { font-size: 12px; color: #8b949e; flex: 1; }
.toolbar .stats span { color: #58a6ff; font-weight: 600; }
.btn { padding: 5px 12px; font-size: 12px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; border-radius: 6px; cursor: pointer; transition: all 0.15s; }
.btn:hover { background: #30363d; border-color: #58a6ff; }
.btn.active { background: #1f6feb; border-color: #1f6feb; color: #fff; }
#cy { flex: 1; }

/* Detail Panel */
.detail-panel { position: absolute; top: 48px; right: 0; width: 340px; background: #161b22; border-left: 1px solid #30363d; height: calc(100% - 48px); overflow-y: auto; transform: translateX(100%); transition: transform 0.25s ease; z-index: 10; }
.detail-panel.open { transform: translateX(0); }
.detail-header { padding: 14px 16px; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
.detail-header h2 { font-size: 14px; font-weight: 600; color: #f0f6fc; }
.detail-close { background: none; border: none; color: #8b949e; font-size: 18px; cursor: pointer; padding: 4px; }
.detail-close:hover { color: #f0f6fc; }
.detail-body { padding: 16px; }
.detail-field { margin-bottom: 12px; }
.detail-field dt { font-size: 11px; color: #8b949e; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px; margin-bottom: 2px; }
.detail-field dd { font-size: 13px; color: #e1e4e8; }
.detail-field dd.code { font-family: 'SF Mono', 'Fira Code', monospace; font-size: 11px; background: #0d1117; padding: 8px; border-radius: 6px; border: 1px solid #30363d; white-space: pre-wrap; max-height: 150px; overflow-y: auto; }
.detail-connections { margin-top: 16px; }
.detail-connections h3 { font-size: 12px; color: #58a6ff; margin-bottom: 8px; }
.conn-item { padding: 6px 8px; background: #0d1117; border: 1px solid #30363d; border-radius: 6px; margin-bottom: 4px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 6px; }
.conn-item:hover { border-color: #58a6ff; background: #161b22; }
.conn-item .conn-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.conn-item .conn-type { font-size: 10px; color: #8b949e; margin-left: auto; }
.badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: 600; }
.badge-feature { background: #1f6feb22; color: #58a6ff; border: 1px solid #1f6feb44; }
.badge-update-set { background: #f0883e22; color: #f0883e; border: 1px solid #f0883e44; }

/* Legend */
.legend { padding: 12px 16px; border-top: 1px solid #30363d; background: #0d1117; }
.legend h3 { font-size: 11px; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
.legend-row { display: flex; align-items: center; gap: 6px; padding: 2px 0; font-size: 11px; color: #8b949e; }
.legend-line { height: 2px; width: 24px; }
.legend-line.dashed { background: repeating-linear-gradient(90deg, currentColor 0, currentColor 4px, transparent 4px, transparent 8px); height: 2px; }

/* Search */
.search-box { padding: 12px 16px; border-bottom: 1px solid #30363d; }
.search-box input { width: 100%; padding: 6px 10px; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; font-size: 12px; }
.search-box input::placeholder { color: #484f58; }
.search-box input:focus { outline: none; border-color: #58a6ff; }
</style>
</head>

// ════════════════════════════════════════════════════════════════════
function buildElements(nodeList, edgeList) {
  const nodeIds = new Set(nodeList.map(n => n.id));
  const elements = [];

  // Feature compound nodes
  const activeFeatures = new Set(nodeList.filter(n => n.feature).map(n => n.feature));
  for (const [fid, f] of Object.entries(FEATURES)) {
    if (activeFeatures.has(fid)) {
      elements.push({
        group: 'nodes',
        data: { id: fid, label: f.name, isFeature: true, disposition: f.disposition, confidence: f.confidence, level: f.level, featureColor: f.color },
        classes: 'feature-node'
      });
    }
  }

  // Artifact nodes
  for (const n of nodeList) {
    const artType = ARTIFACT_TYPES[n.type] || { label: n.type, color: '#8b949e', shape: 'ellipse' };
    elements.push({
      group: 'nodes',
      data: {
        id: n.id, label: n.name, parent: showClusters && n.feature ? n.feature : undefined,
        artType: n.type, artLabel: artType.label, artColor: artType.color, artShape: artType.shape,
        table: n.table || '—', feature: n.feature, featureName: n.feature ? FEATURES[n.feature]?.name : 'Ungrouped',
        origin: n.origin, creator: n.creator, updated: n.updated,
        nodeSize: 30
      },
    });
  }

  // Edges
  for (const e of edgeList) {
    if (!nodeIds.has(e.source) || !nodeIds.has(e.target)) continue;
    const et = EDGE_TYPES[e.type] || { color: '#8b949e', style: 'solid' };
    elements.push({
      group: 'edges',
      data: {
        id: `${e.source}-${e.target}-${e.type}`,
        source: e.source, target: e.target,
        edgeType: e.type, edgeLabel: et.label, edgeColor: et.color, edgeStyle: et.style,
        detail: e.detail,
      }
    });
  }
  return elements;
}

// ════════════════════════════════════════════════════════════════════
// CYTOSCAPE INIT
// ════════════════════════════════════════════════════════════════════
let showClusters = false;
let showLabels = true;
let currentView = 'assessment';
let cy;

function initCy(elements) {
  if (cy) cy.destroy();
  cy = cytoscape({
    container: document.getElementById('cy'),
    elements: elements,
    style: [
      // Feature compound nodes
      { selector: '.feature-node',
        style: {
          'background-color': 'data(featureColor)', 'background-opacity': 0.08,
          'border-color': 'data(featureColor)', 'border-width': 2, 'border-opacity': 0.4,
          'label': 'data(label)', 'font-size': 14, 'color': '#8b949e',
          'text-valign': 'top', 'text-halign': 'center', 'text-margin-y': -8,
          'shape': 'roundrectangle', 'padding': 30,
        }
      },
      // Regular nodes
      { selector: 'node[!isFeature]',
        style: {
          'background-color': 'data(artColor)', 'width': 'data(nodeSize)', 'height': 'data(nodeSize)',
          'shape': 'data(artShape)',
          'label': showLabels ? 'data(label)' : '',
          'font-size': 10, 'color': '#c9d1d9',
          'text-valign': 'bottom', 'text-halign': 'center', 'text-margin-y': 6,
          'border-width': 0, 'text-max-width': 120, 'text-wrap': 'ellipsis',
          'overlay-opacity': 0,
        }
      },
      { selector: 'node[!isFeature]:active', style: { 'overlay-opacity': 0 } },
      { selector: 'node.highlighted',
        style: { 'border-width': 3, 'border-color': '#f0f6fc', 'z-index': 999 }
      },
      { selector: 'node.faded', style: { 'opacity': 0.15 } },
      { selector: 'node.search-match',
        style: { 'border-width': 3, 'border-color': '#f0883e', 'z-index': 999 }
      },
      // Edges
      { selector: 'edge',
        style: {
          'line-color': 'data(edgeColor)', 'target-arrow-color': 'data(edgeColor)',
          'target-arrow-shape': 'triangle', 'arrow-scale': 0.8,
          'width': 1.5, 'curve-style': 'bezier', 'opacity': 0.6,
        }
      },
      { selector: 'edge[edgeStyle="dashed"]',
        style: { 'line-style': 'dashed', 'line-dash-pattern': [6, 3] }
      },
      { selector: 'edge.highlighted',
        style: { 'width': 3, 'opacity': 1, 'z-index': 999 }
      },
      { selector: 'edge.faded', style: { 'opacity': 0.05 } },
    ],
    layout: { name: 'cose', animate: true, animationDuration: 800, nodeRepulsion: () => 8000, idealEdgeLength: () => 120, gravity: 0.3, padding: 40 },
    wheelSensitivity: 0.3,
    minZoom: 0.1, maxZoom: 5,
  });

  // Click handlers
  cy.on('tap', 'node[!isFeature]', function(evt) {
    const node = evt.target;
    highlightNode(node);
    showDetail(node.data());
  });

  cy.on('tap', '.feature-node', function(evt) {
    showFeatureDetail(evt.target.data());
  });

  cy.on('tap', function(evt) {
    if (evt.target === cy) { clearHighlight(); closeDetail(); }
  });

  updateStats();
  buildFilterUI();
}

// ════════════════════════════════════════════════════════════════════
// HIGHLIGHT / DETAIL
// ════════════════════════════════════════════════════════════════════
function highlightNode(node) {
  clearHighlight();
  const neighborhood = node.neighborhood().add(node);
  cy.elements().addClass('faded');
  neighborhood.removeClass('faded');
  node.addClass('highlighted');
  neighborhood.edges().addClass('highlighted');
  neighborhood.nodes('[!isFeature]').addClass('highlighted');
}

function clearHighlight() {
  cy.elements().removeClass('faded highlighted search-match');
}

function showDetail(d) {
  const panel = document.getElementById('detailPanel');
  const body = document.getElementById('detailBody');
  document.getElementById('detailTitle', d.artLabel);

  const artType = ARTIFACT_TYPES[d.artType] || {};
  const originBadge = d.origin === 'modified_ootb' ? '<span style="color:#f0883e;">Modified OOTB</span>' : d.origin === 'net_new_customer' ? '<span style="color:#f97583;">Customer-Created</span>' : d.origin;

  // Find connections
  const node = cy.getElementById(d.id);
  const incomers = node.incomers('edge');
  const outgoers = node.outgoers('edge');

  let connectionsHTML = '';
  const allEdges = [...incomers.toArray(), ...outgoers.toArray()];

  if (allEdges.length > 0) {
    const refs = allEdges.map(edge => {
      const ed = edge.data();
      const otherId = ed.source === d.id ? ed.target : ed.source;
      const otherNode = cy.getElementById(otherId);
      const od = otherNode.data();
      const direction = ed.source === d.id ? '→' : '←';
      const et = EDGE_TYPES[ed.edgeType] || {};
      return `<div class="conn-item" onclick="cy.getElementById('${otherId}').trigger('tap')">
        <div class="conn-dot" style="background:${od.artColor || '#8b949e'}"></div>
        <span>${direction} ${od.label}</span>
        <span class="conn-type" style="color:${et.color || '#8b949e'}">${ed.edgeType.replace('_',' ')}</span>
      </div>`;
    });
    connectionsHTML = `<div class="detail-connections"><h3>Connections (${allEdges.length})</h3>${refs.join('')}</div>`;

    // Edge detail tooltips
    const edgeDetails = allEdges.filter(e => e.data().detail).map(e => {
      const ed = e.data();
      const et = EDGE_TYPES[ed.edgeType] || {};
      return `<div style="font-size:11px;color:#8b949e;padding:2px 0;"><span style="color:${et.color}">●</span> ${ed.detail}</div>`;
    });
    if (edgeDetails.length > 0) {
      connectionsHTML += `<div style="margin-top:12px;"><h3 style="font-size:12px;color:#58a6ff;margin-bottom:6px;">Reference Details</h3>${edgeDetails.join('')}</div>`;
    }
  }

  body.innerHTML = `
    <dl>
      <div class="detail-field"><dt>Type</dt><dd><span style="color:${artType.color || '#8b949e'}">●</span> ${artType.label || d.artType}</dd></div>
      <div class="detail-field"><dt>Name</dt><dd>${d.label}</dd></div>
      <div class="detail-field"><dt>Target Table</dt><dd>${d.table}</dd></div>
      <div class="detail-field"><dt>Feature</dt><dd>${d.feature ? `<span class="badge badge-feature">${d.featureName}</span>` : '<span style="color:#8b949e">Ungrouped</span>'}</dd></div>
      <div class="detail-field"><dt>Origin</dt><dd>${originBadge}</dd></div>
      <div class="detail-field"><dt>Creator</dt><dd>${d.creator}</dd></div>
      <div class="detail-field"><dt>Last Updated</dt><dd>${d.updated}</dd></div>
    </dl>
    ${connectionsHTML}
  `;

  panel.classList.add('open');
}

function showFeatureDetail(d) {
  const panel = document.getElementById('detailPanel');
  const body = document.getElementById('detailBody');
  const f = Object.entries(FEATURES).find(([k]) => k === d.id);
  if (!f) return;
  const [fid, fdata] = f;

  const members = cy.nodes(`[feature="${fid}"]`);
  const memberList = members.toArray().map(n => {
    const nd = n.data();
    const at = ARTIFACT_TYPES[nd.artType] || {};
    return `<div class="conn-item" onclick="cy.getElementById('${nd.id}').trigger('tap')">
      <div class="conn-dot" style="background:${at.color}"></div>
      <span>${nd.label}</span>
      <span class="conn-type">${at.label}</span>
    </div>`;
  });

  const dispColor = { remove: '#da3633', keep_as_is: '#238636', keep_and_refactor: '#d29922', needs_analysis: '#8b949e' };

  body.innerHTML = `
    <dl>
      <div class="detail-field"><dt>Feature</dt><dd style="font-size:15px;font-weight:600;">${fdata.name}</dd></div>
      <div class="detail-field"><dt>Disposition</dt><dd><span style="color:${dispColor[fdata.disposition]};font-weight:600;">${fdata.disposition.replace(/_/g,' ').toUpperCase()}</span></dd></div>
      <div class="detail-field"><dt>Confidence</dt><dd>${fdata.confidence}/15 — <span style="color:${fdata.level==='high'?'#56d364':fdata.level==='medium'?'#d29922':'#f97583'}">${fdata.level}</span></dd></div>
      <div class="detail-field"><dt>Members</dt><dd>${members.length} artifacts</dd></div>
    </dl>
    <div class="detail-connections"><h3>Member Artifacts</h3>${memberList.join('')}</div>
  `;
  panel.classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
}

// ════════════════════════════════════════════════════════════════════
// FILTERS
// ════════════════════════════════════════════════════════════════════
function buildFilterUI() {
  // Node type filters
  const typeCounts = {};
  cy.nodes('[!isFeature]').forEach(n => {
    const t = n.data('artType');
    typeCounts[t] = (typeCounts[t] || 0) + 1;
  });

  const nodeFiltersEl = document.getElementById('nodeFilters');
  nodeFiltersEl.innerHTML = '';
  const sortedTypes = Object.entries(typeCounts).sort((a,b) => b[1] - a[1]);
  for (const [type, count] of sortedTypes) {
    const at = ARTIFACT_TYPES[type] || { label: type, color: '#8b949e' };
    const item = document.createElement('div');
    item.className = 'filter-item';
    item.innerHTML = `<input type="checkbox" checked data-filter-type="${type}" id="ft_${type}">
      <div class="color-dot" style="background:${at.color}"></div>
      <label for="ft_${type}">${at.label}</label>
      <span class="count">${count}</span>`;
    nodeFiltersEl.appendChild(item);
  }

  // Edge type filters
  const edgeCounts = {};
  cy.edges().forEach(e => {
    const t = e.data('edgeType');
    edgeCounts[t] = (edgeCounts[t] || 0) + 1;
  });

  const edgeFiltersEl = document.getElementById('edgeFilters');
  edgeFiltersEl.innerHTML = '';
  for (const [type, count] of Object.entries(edgeCounts)) {
    const et = EDGE_TYPES[type] || { label: type, color: '#8b949e' };
    const item = document.createElement('div');
    item.className = 'edge-filter-item';
    item.innerHTML = `<input type="checkbox" checked data-filter-edge="${type}" id="fe_${type}">
      <div class="edge-line" style="background:${et.color};${et.style==='dashed'?'background:repeating-linear-gradient(90deg,'+et.color+' 0,'+et.color+' 4px,transparent 4px,transparent 8px)':''}"></div>
      <label for="fe_${type}">${et.label}</label>
      <span class="count" style="font-size:11px;color:#8b949e;">${count}</span>`;
    edgeFiltersEl.appendChild(item);
  }

  // Attach filter handlers
  nodeFiltersEl.addEventListener('change', applyFilters);
  edgeFiltersEl.addEventListener('change', applyFilters);
}

function applyFilters() {
  const checkedTypes = new Set([...document.querySelectorAll('[data-filter-type]:checked')].map(el => el.dataset.filterType));
  const checkedEdges = new Set([...document.querySelectorAll('[data-filter-edge]:checked')].map(el => el.dataset.filterEdge));

  cy.batch(() => {
    cy.nodes('[!isFeature]').forEach(n => {
      if (checkedTypes.has(n.data('artType'))) { n.style('display', 'element'); }
      else { n.style('display', 'none'); }
    });
    cy.edges().forEach(e => {
      const srcVis = cy.getElementById(e.data('source')).style('display') !== 'none';
      const tgtVis = cy.getElementById(e.data('target')).style('display') !== 'none';
      if (checkedEdges.has(e.data('edgeType')) && srcVis && tgtVis) { e.style('display', 'element'); }
      else { e.style('display', 'none'); }
    });
    // Hide empty feature compounds
    cy.nodes('.feature-node').forEach(fn => {
      const children = fn.children().filter(c => c.style('display') !== 'none');
      fn.style('display', children.length > 0 ? 'element' : 'none');
    });
  });
  updateStats();
}

// ════════════════════════════════════════════════════════════════════
// VIEW MODES
// ════════════════════════════════════════════════════════════════════
function switchView(view) {
  currentView = view;
  document.querySelectorAll('.view-tab').forEach(t => t.classList.toggle('active', t.dataset.view === view));

  let nodes, edges;

  if (view === 'instance') {
    // Show ALL artifacts across ALL assessments for this instance
    nodes = sampleNodes;
    edges = sampleEdges;
  } else if (view === 'assessment') {
    const asmtId = document.getElementById('scopeSelect').value;
    const asmt = ASSESSMENTS[asmtId];
    if (asmt) {
      const nodeIds = new Set(asmt.nodes);
      nodes = sampleNodes.filter(n => nodeIds.has(n.id));
      edges = sampleEdges.filter(e => nodeIds.has(e.source) && nodeIds.has(e.target));
    } else {
      nodes = sampleNodes; edges = sampleEdges;
    }
  } else if (view === 'feature') {
    // Show one feature at a time — pick first feature with members
    const fid = Object.keys(FEATURES)[0];
    nodes = sampleNodes.filter(n => n.feature === fid);
    // Also include nodes referenced by edges that cross feature boundary
    const featureNodeIds = new Set(nodes.map(n => n.id));
    const relevantEdges = sampleEdges.filter(e => featureNodeIds.has(e.source) || featureNodeIds.has(e.target));
    const extraNodeIds = new Set();
    relevantEdges.forEach(e => { extraNodeIds.add(e.source); extraNodeIds.add(e.target); });
    const extraNodes = sampleNodes.filter(n => extraNodeIds.has(n.id) && !featureNodeIds.has(n.id));
    nodes = [...nodes, ...extraNodes];
    edges = relevantEdges;
  } else if (view === 'artifact') {
    // Deep dive from a single node — pick the ApprovalHelper as example
    const rootId = 'n3';
    const depth2Ids = new Set([rootId]);
    // Level 1
    sampleEdges.forEach(e => { if (e.source === rootId) depth2Ids.add(e.target); if (e.target === rootId) depth2Ids.add(e.source); });
    // Level 2
    const level1 = new Set(depth2Ids);
    sampleEdges.forEach(e => { if (level1.has(e.source)) depth2Ids.add(e.target); if (level1.has(e.target)) depth2Ids.add(e.source); });
    nodes = sampleNodes.filter(n => depth2Ids.has(n.id));
    edges = sampleEdges.filter(e => depth2Ids.has(e.source) && depth2Ids.has(e.target));
  }

  const elements = buildElements(nodes, edges);
  initCy(elements);
}

// ════════════════════════════════════════════════════════════════════
// SEARCH
// ════════════════════════════════════════════════════════════════════
document.getElementById('searchInput').addEventListener('input', function(e) {
  const q = e.target.value.toLowerCase().trim();
  clearHighlight();
  if (!q) return;
  cy.nodes('[!isFeature]').forEach(n => {
    if (n.data('label').toLowerCase().includes(q) || (n.data('artLabel')||'').toLowerCase().includes(q)) {
      n.addClass('search-match');
    }
  });
});

// ════════════════════════════════════════════════════════════════════
// TOOLBAR BUTTONS
// ════════════════════════════════════════════════════════════════════
document.getElementById('btnCluster').addEventListener('click', function() {
  showClusters = !showClusters;
  this.classList.toggle('active', showClusters);
  switchView(currentView);
});

document.getElementById('btnLayout').addEventListener('click', function() {
  cy.layout({ name: 'cose', animate: true, animationDuration: 800, nodeRepulsion: () => 8000, idealEdgeLength: () => 120, gravity: 0.3, padding: 40 }).run();
});

document.getElementById('btnFit').addEventListener('click', function() {
  cy.fit(cy.elements(), 40);
});

document.getElementById('btnLabels').addEventListener('click', function() {
  showLabels = !showLabels;
  this.classList.toggle('active', showLabels);
  cy.nodes('[!isFeature]').style('label', showLabels ? 'data(label)' : '');
});

document.getElementById('detailClose').addEventListener('click', () => { closeDetail(); clearHighlight(); });

// View tabs
document.querySelectorAll('.view-tab').forEach(tab => {
  tab.addEventListener('click', () => switchView(tab.dataset.view));
});

// Scope select
document.getElementById('scopeSelect').addEventListener('change', () => switchView(currentView));

function updateStats() {
  const visNodes = cy.nodes('[!isFeature]').filter(n => n.style('display') !== 'none');
  const visEdges = cy.edges().filter(e => e.style('display') !== 'none');
  const visFeatures = new Set();
  visNodes.forEach(n => { if (n.data('feature')) visFeatures.add(n.data('feature')); });
  document.getElementById('nodeCount').textContent = visNodes.length;
  document.getElementById('edgeCount').textContent = visEdges.length;
  document.getElementById('featureCount').textContent = visFeatures.size;
}

// ════════════════════════════════════════════════════════════════════
// INIT
// ════════════════════════════════════════════════════════════════════
switchView('assessment');
</script>

</html>
